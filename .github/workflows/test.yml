name: Test Suite

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*'
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test-zipp-core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/zipp-core/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clone formlogic-rust
        uses: actions/checkout@v4
        with:
          repository: f2i-com/formlogic-rust
          path: formlogic-rust

      - name: Install wasm-bindgen-cli
        uses: jetli/wasm-bindgen-action@v0.2.0
        with:
          version: 'latest'

      - name: Build formlogic-rust WASM
        shell: bash
        working-directory: formlogic-rust
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build -p formlogic-wasm --target wasm32-unknown-unknown --release
          wasm-bindgen --target web --out-dir dist-wasm ./target/wasm32-unknown-unknown/release/formlogic_wasm.wasm

      - name: Install zipp-core dependencies
        working-directory: packages/zipp-core
        run: npm ci

      - name: Build zipp-core
        working-directory: packages/zipp-core
        run: npm run build

      - name: Run tests with coverage
        working-directory: packages/zipp-core
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: packages/zipp-core/coverage/lcov.info
          flags: zipp-core
          name: zipp-core-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/zipp-core/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clone formlogic-rust
        uses: actions/checkout@v4
        with:
          repository: f2i-com/formlogic-rust
          path: formlogic-rust

      - name: Install wasm-bindgen-cli
        uses: jetli/wasm-bindgen-action@v0.2.0
        with:
          version: 'latest'

      - name: Build formlogic-rust WASM
        shell: bash
        working-directory: formlogic-rust
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build -p formlogic-wasm --target wasm32-unknown-unknown --release
          wasm-bindgen --target web --out-dir dist-wasm ./target/wasm32-unknown-unknown/release/formlogic_wasm.wasm

      - name: Install zipp-core dependencies
        working-directory: packages/zipp-core
        run: npm ci

      - name: TypeScript type check
        working-directory: packages/zipp-core
        run: npx tsc --noEmit

  rust-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux-specific dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libxdo-dev

      # Download FFmpeg binaries (required by Tauri build script even for cargo check)
      - name: Download FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $binDir = "${{ github.workspace }}\packages\zipp-desktop\src-tauri\bin"

          Write-Host "Creating bin directory at: $binDir"
          New-Item -ItemType Directory -Force -Path $binDir

          Write-Host "Downloading FFmpeg..."
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip

          Write-Host "Extracting..."
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-temp

          $ffmpegBin = Get-ChildItem -Path ffmpeg-temp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobeBin = Get-ChildItem -Path ffmpeg-temp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1

          Copy-Item $ffmpegBin.FullName "$binDir\ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item $ffprobeBin.FullName "$binDir\ffprobe-x86_64-pc-windows-msvc.exe"

          Write-Host "FFmpeg binaries installed"
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg-temp

      - name: Download FFmpeg (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          set -ex
          BIN_DIR="${{ github.workspace }}/packages/zipp-desktop/src-tauri/bin"
          mkdir -p "$BIN_DIR"

          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg-release-amd64-static.tar.xz

          FFMPEG_SRC=$(find . -maxdepth 1 -type d -name "ffmpeg-*-amd64-static" | head -1)
          cp "$FFMPEG_SRC/ffmpeg" "$BIN_DIR/ffmpeg-x86_64-unknown-linux-gnu"
          cp "$FFMPEG_SRC/ffprobe" "$BIN_DIR/ffprobe-x86_64-unknown-linux-gnu"
          chmod +x "$BIN_DIR/ffmpeg-x86_64-unknown-linux-gnu" "$BIN_DIR/ffprobe-x86_64-unknown-linux-gnu"

          echo "FFmpeg binaries installed"
          rm -rf ffmpeg-release-amd64-static.tar.xz "$FFMPEG_SRC"

      - name: Rust cargo check
        working-directory: packages/zipp-desktop/src-tauri
        run: cargo check

      - name: Rust cargo clippy
        working-directory: packages/zipp-desktop/src-tauri
        run: cargo clippy -- -D warnings
        continue-on-error: true
