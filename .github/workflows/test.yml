name: Test Suite

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*'
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test-zipp-core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/zipp-core/package-lock.json

      - name: Clone formlogic-typescript
        uses: actions/checkout@v4
        with:
          repository: f2i-com/formlogic-typescript
          path: formlogic-typescript

      - name: Install and build formlogic-typescript
        working-directory: formlogic-typescript
        run: |
          npm install
          npm run build

      - name: Install zipp-core dependencies
        working-directory: packages/zipp-core
        run: npm ci

      - name: Build zipp-core
        working-directory: packages/zipp-core
        run: npm run build

      - name: Run tests with coverage
        working-directory: packages/zipp-core
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: packages/zipp-core/coverage/lcov.info
          flags: zipp-core
          name: zipp-core-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/zipp-core/package-lock.json

      - name: Clone formlogic-typescript
        uses: actions/checkout@v4
        with:
          repository: f2i-com/formlogic-typescript
          path: formlogic-typescript

      - name: Install and build formlogic-typescript
        working-directory: formlogic-typescript
        run: |
          npm install
          npm run build

      - name: Install zipp-core dependencies
        working-directory: packages/zipp-core
        run: npm ci

      - name: TypeScript type check
        working-directory: packages/zipp-core
        run: npx tsc --noEmit

  rust-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux-specific dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev

      - name: Rust cargo check
        working-directory: packages/zipp-desktop/src-tauri
        run: cargo check

      - name: Rust cargo clippy
        working-directory: packages/zipp-desktop/src-tauri
        run: cargo clippy -- -D warnings
        continue-on-error: true
