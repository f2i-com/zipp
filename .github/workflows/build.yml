name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.0.1)'
        required: false
        default: 'dev'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: zipp-windows-x64
            bundle_path: |
              packages/zipp-desktop/src-tauri/target/release/bundle/msi/*.msi
              packages/zipp-desktop/src-tauri/target/release/bundle/nsis/*.exe
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_name: zipp-linux-x64
            bundle_path: |
              packages/zipp-desktop/src-tauri/target/release/bundle/deb/*.deb
              packages/zipp-desktop/src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux-specific dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libxdo-dev

      - name: Clone formlogic-rust
        uses: actions/checkout@v4
        with:
          repository: f2i-com/formlogic-rust
          path: formlogic-rust

      # package.json references ../../../formlogic-rust from packages/*/
      # which resolves to one level above workspace (matching local dev layout)
      - name: Symlink formlogic-rust for npm resolution (Linux/macOS)
        if: runner.os != 'Windows'
        run: ln -s "$GITHUB_WORKSPACE/formlogic-rust" "$GITHUB_WORKSPACE/../formlogic-rust"

      - name: Symlink formlogic-rust for npm resolution (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: mklink /J "${{ github.workspace }}\..\formlogic-rust" "${{ github.workspace }}\formlogic-rust"

      - name: Install wasm-bindgen-cli
        shell: bash
        working-directory: formlogic-rust
        run: |
          WB_VER=$(grep -A1 'name = "wasm-bindgen"' Cargo.lock | grep 'version' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Installing wasm-bindgen-cli@$WB_VER (from Cargo.lock)"
          cargo install wasm-bindgen-cli --version "$WB_VER"

      - name: Build formlogic-rust WASM
        shell: bash
        working-directory: formlogic-rust
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build -p formlogic-wasm --target wasm32-unknown-unknown --release
          wasm-bindgen --target web --out-dir dist-wasm ./target/wasm32-unknown-unknown/release/formlogic_wasm.wasm
          echo '{"name":"formlogic-lang","version":"0.1.0","main":"formlogic_wasm.js","types":"formlogic_wasm.d.ts","type":"module"}' > dist-wasm/package.json

      - name: Install and build zipp-core
        working-directory: packages/zipp-core
        run: |
          npm install
          npm run build

      - name: Run zipp-core tests
        working-directory: packages/zipp-core
        run: npm test

      - name: Install and build zipp-ui-components
        working-directory: packages/zipp-ui-components
        run: |
          npm install
          npm run build

      - name: Install zipp-desktop dependencies
        working-directory: packages/zipp-desktop
        run: npm install

      # Download FFmpeg binaries RIGHT BEFORE Tauri build
      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $binDir = "${{ github.workspace }}\packages\zipp-desktop\src-tauri\bin"

          Write-Host "Creating bin directory at: $binDir"
          New-Item -ItemType Directory -Force -Path $binDir

          Write-Host "Downloading FFmpeg..."
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip

          Write-Host "Extracting..."
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-temp

          # Find and copy binaries
          $ffmpegBin = Get-ChildItem -Path ffmpeg-temp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobeBin = Get-ChildItem -Path ffmpeg-temp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1

          if (-not $ffmpegBin) { throw "ffmpeg.exe not found in archive" }
          if (-not $ffprobeBin) { throw "ffprobe.exe not found in archive" }

          Write-Host "Found ffmpeg at: $($ffmpegBin.FullName)"
          Write-Host "Found ffprobe at: $($ffprobeBin.FullName)"

          Copy-Item $ffmpegBin.FullName "$binDir\ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item $ffprobeBin.FullName "$binDir\ffprobe-x86_64-pc-windows-msvc.exe"

          Write-Host "Verifying files in $binDir :"
          Get-ChildItem $binDir

          if (-not (Test-Path "$binDir\ffmpeg-x86_64-pc-windows-msvc.exe")) {
            throw "ffmpeg binary was not copied correctly"
          }
          if (-not (Test-Path "$binDir\ffprobe-x86_64-pc-windows-msvc.exe")) {
            throw "ffprobe binary was not copied correctly"
          }

          Write-Host "FFmpeg binaries installed successfully at $binDir"
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg-temp

      - name: Download FFmpeg (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          set -ex
          BIN_DIR="${{ github.workspace }}/packages/zipp-desktop/src-tauri/bin"

          echo "Creating bin directory at: $BIN_DIR"
          mkdir -p "$BIN_DIR"

          echo "Downloading FFmpeg..."
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz

          echo "Extracting..."
          tar -xf ffmpeg-release-amd64-static.tar.xz

          # Find the extracted directory
          FFMPEG_SRC=$(find . -maxdepth 1 -type d -name "ffmpeg-*-amd64-static" | head -1)
          echo "Source directory: $FFMPEG_SRC"

          if [ -z "$FFMPEG_SRC" ]; then
            echo "ERROR: Could not find extracted FFmpeg directory"
            exit 1
          fi

          # Copy binaries
          cp "$FFMPEG_SRC/ffmpeg" "$BIN_DIR/ffmpeg-x86_64-unknown-linux-gnu"
          cp "$FFMPEG_SRC/ffprobe" "$BIN_DIR/ffprobe-x86_64-unknown-linux-gnu"

          chmod +x "$BIN_DIR/ffmpeg-x86_64-unknown-linux-gnu"
          chmod +x "$BIN_DIR/ffprobe-x86_64-unknown-linux-gnu"

          echo "Verifying files in $BIN_DIR:"
          ls -la "$BIN_DIR/"

          if [ ! -f "$BIN_DIR/ffmpeg-x86_64-unknown-linux-gnu" ]; then
            echo "ERROR: ffmpeg binary not found"
            exit 1
          fi
          if [ ! -f "$BIN_DIR/ffprobe-x86_64-unknown-linux-gnu" ]; then
            echo "ERROR: ffprobe binary not found"
            exit 1
          fi

          echo "FFmpeg binaries installed successfully at $BIN_DIR"
          rm -rf ffmpeg-release-amd64-static.tar.xz "$FFMPEG_SRC"

      - name: Verify bin directory before Tauri build
        shell: bash
        run: |
          echo "=== Workspace: ${{ github.workspace }} ==="
          echo "=== Listing src-tauri/bin directory ==="
          ls -la "${{ github.workspace }}/packages/zipp-desktop/src-tauri/bin/" || echo "bin directory does not exist!"

      - name: Build Tauri app
        working-directory: packages/zipp-desktop
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
