name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.0.1)'
        required: false
        default: 'dev'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clone formlogic-typescript
        uses: actions/checkout@v4
        with:
          repository: f2i-com/formlogic-typescript
          path: formlogic-typescript

      - name: Install and build formlogic-typescript
        working-directory: formlogic-typescript
        run: |
          npm install
          npm run build

      - name: Install and build zipp-core
        working-directory: packages/zipp-core
        run: |
          npm install
          npm run build

      - name: Run zipp-core tests
        working-directory: packages/zipp-core
        run: npm test

      - name: Install and build zipp-ui-components
        working-directory: packages/zipp-ui-components
        run: |
          npm install
          npm run build

      - name: Install zipp-desktop dependencies
        working-directory: packages/zipp-desktop
        run: npm install

      - name: Build Tauri app
        working-directory: packages/zipp-desktop
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zipp-windows-x64
          path: |
            packages/zipp-desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/zipp-desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
