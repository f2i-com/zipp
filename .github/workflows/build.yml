name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.0.1)'
        required: false
        default: 'dev'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: zipp-windows-x64
            bundle_path: |
              packages/zipp-desktop/src-tauri/target/release/bundle/msi/*.msi
              packages/zipp-desktop/src-tauri/target/release/bundle/nsis/*.exe
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: zipp-linux-x64
            bundle_path: |
              packages/zipp-desktop/src-tauri/target/release/bundle/deb/*.deb
              packages/zipp-desktop/src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux-specific dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Clone formlogic-typescript
        uses: actions/checkout@v4
        with:
          repository: f2i-com/formlogic-typescript
          path: formlogic-typescript

      - name: Install and build formlogic-typescript
        working-directory: formlogic-typescript
        run: |
          npm install
          npm run build

      - name: Install and build zipp-core
        working-directory: packages/zipp-core
        run: |
          npm install
          npm run build

      - name: Run zipp-core tests
        working-directory: packages/zipp-core
        run: npm test

      - name: Install and build zipp-ui-components
        working-directory: packages/zipp-ui-components
        run: |
          npm install
          npm run build

      - name: Install zipp-desktop dependencies
        working-directory: packages/zipp-desktop
        run: npm install

      - name: Build Tauri app
        working-directory: packages/zipp-desktop
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
