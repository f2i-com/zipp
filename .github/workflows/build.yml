name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.0.1)'
        required: false
        default: 'dev'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: zipp-windows-x64
            bundle_path: |
              packages/zipp-desktop/src-tauri/target/release/bundle/msi/*.msi
              packages/zipp-desktop/src-tauri/target/release/bundle/nsis/*.exe
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_name: zipp-linux-x64
            bundle_path: |
              packages/zipp-desktop/src-tauri/target/release/bundle/deb/*.deb
              packages/zipp-desktop/src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux-specific dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev

      # Download FFmpeg binaries for bundling
      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ffmpegDir = "packages/zipp-desktop/src-tauri/bin"
          New-Item -ItemType Directory -Force -Path $ffmpegDir

          # Download FFmpeg release
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-temp

          # Find and copy binaries with Tauri's expected naming convention
          $ffmpegBin = Get-ChildItem -Path ffmpeg-temp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobeBin = Get-ChildItem -Path ffmpeg-temp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1

          Write-Host "Found ffmpeg at: $($ffmpegBin.FullName)"
          Write-Host "Found ffprobe at: $($ffprobeBin.FullName)"

          Copy-Item $ffmpegBin.FullName "$ffmpegDir/ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item $ffprobeBin.FullName "$ffmpegDir/ffprobe-x86_64-pc-windows-msvc.exe"

          # Verify files exist
          Get-ChildItem $ffmpegDir

          # Cleanup
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg-temp

      - name: Download FFmpeg (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          mkdir -p packages/zipp-desktop/src-tauri/bin

          # Download FFmpeg static build
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg-release-amd64-static.tar.xz

          # Copy binaries with Tauri's expected naming convention
          FFMPEG_DIR=$(ls -d ffmpeg-*-amd64-static)
          cp "$FFMPEG_DIR/ffmpeg" packages/zipp-desktop/src-tauri/bin/ffmpeg-x86_64-unknown-linux-gnu
          cp "$FFMPEG_DIR/ffprobe" packages/zipp-desktop/src-tauri/bin/ffprobe-x86_64-unknown-linux-gnu

          # Make executable
          chmod +x packages/zipp-desktop/src-tauri/bin/ffmpeg-x86_64-unknown-linux-gnu
          chmod +x packages/zipp-desktop/src-tauri/bin/ffprobe-x86_64-unknown-linux-gnu

          # Cleanup
          rm -rf ffmpeg-release-amd64-static.tar.xz "$FFMPEG_DIR"

      - name: Clone formlogic-typescript
        uses: actions/checkout@v4
        with:
          repository: f2i-com/formlogic-typescript
          path: formlogic-typescript

      - name: Install and build formlogic-typescript
        working-directory: formlogic-typescript
        run: |
          npm install
          npm run build

      - name: Install and build zipp-core
        working-directory: packages/zipp-core
        run: |
          npm install
          npm run build

      - name: Run zipp-core tests
        working-directory: packages/zipp-core
        run: npm test

      - name: Install and build zipp-ui-components
        working-directory: packages/zipp-ui-components
        run: |
          npm install
          npm run build

      - name: Install zipp-desktop dependencies
        working-directory: packages/zipp-desktop
        run: npm install

      - name: Build Tauri app
        working-directory: packages/zipp-desktop
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
