[package]
name = "zipp-audio"
version = "1.0.0"
edition = "2021"
description = "Audio processing module for Zipp - TTS using sherpa-onnx"
authors = ["Zipp Team"]

[lib]
name = "zipp_audio"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2", features = [] }
base64 = "0.22"
dirs = "5"

# Sherpa ONNX for TTS - enables embedded speech synthesis
sherpa-rs = { version = "0.1", features = ["tts"] }

[target.'cfg(windows)'.dependencies]
# Windows-specific dependencies if needed

[features]
default = []
