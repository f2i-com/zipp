[package]
name = "tauri-plugin-zipp-terminal"
version = "1.0.0"
edition = "2021"
description = "Terminal automation module for Zipp - PTY management and keyboard simulation"
authors = ["Zipp Team"]
links = "tauri-plugin-zipp-terminal"

[lib]
name = "tauri_plugin_zipp_terminal"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["sync", "time", "process", "io-util"] }
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"
image = "0.25"
xcap = "0.7"
enigo = "0.2"

[target.'cfg(target_os = "windows")'.dependencies]
# Windows-specific for PTY
windows = { version = "0.58", features = [
    "Win32_System_Console",
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Threading",
    "Win32_System_Pipes",
] }

[target.'cfg(any(target_os = "linux", target_os = "macos"))'.dependencies]
# Unix PTY support
nix = { version = "0.29", features = ["term", "process", "fs"] }

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }

[features]
default = []
