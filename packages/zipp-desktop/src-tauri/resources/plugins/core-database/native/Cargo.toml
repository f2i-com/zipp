[package]
name = "tauri-plugin-zipp-database"
version = "1.0.0"
edition = "2021"
description = "Database module for Zipp - Data storage and retrieval"
authors = ["Zipp Team"]

[lib]
name = "tauri_plugin_zipp_database"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2", features = [] }
rusqlite = { version = "0.31", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }

[target.'cfg(windows)'.dependencies]
# Windows-specific dependencies if needed

[features]
default = []
