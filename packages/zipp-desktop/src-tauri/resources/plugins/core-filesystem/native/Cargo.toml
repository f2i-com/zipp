[package]
name = "tauri-plugin-zipp-filesystem"
version = "1.0.0"
edition = "2021"
description = "Filesystem module for Zipp - File operations and directory handling"
authors = ["Zipp Team"]
links = "tauri-plugin-zipp-filesystem"

[lib]
name = "tauri_plugin_zipp_filesystem"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
base64 = "0.22"
glob = "0.3"
walkdir = "2"
dirs = "5"
chrono = "0.4"

[target.'cfg(windows)'.dependencies]
# Windows-specific dependencies if needed

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }

[features]
default = []
