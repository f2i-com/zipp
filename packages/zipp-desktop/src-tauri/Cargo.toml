[package]
name = "zipp-desktop"
version = "0.0.1"
description = "Zipp - Visual Workflow Builder Desktop App"
authors = ["you"]
license = ""
repository = ""
edition = "2021"

[lib]
name = "zipp_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools", "protocol-asset", "tray-icon"] }
tauri-plugin-shell = "2"
clap = { version = "4", features = ["derive"] }
tauri-plugin-screenshots = "2.2"
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
tauri-plugin-dialog = "2"
tauri-plugin-zipp-database = { path = "../../zipp-core/modules/core-database/native" }
tauri-plugin-zipp-filesystem = { path = "../../zipp-core/modules/core-filesystem/native" }
tauri-plugin-zipp-browser = { path = "../../zipp-core/modules/core-browser/native" }
tauri-plugin-zipp-terminal = { path = "../../zipp-core/modules/core-terminal/native" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json", "cookies"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"
url = "2"
chrono = "0.4"
image = "0.25"
ffmpeg-sidecar = "2.0"
tempfile = "3"
dirs = "5"
# API Server dependencies
axum = { version = "0.7", features = ["macros"] }
tower-http = { version = "0.6", features = ["cors", "fs"] }
once_cell = "1.18"
# Package system dependencies
zip = "2"
sha2 = "0.10"
hex = "0.4"

[target.'cfg(target_os = "linux")'.dependencies]
webkit2gtk = "2.0"
javascriptcore-rs = "1.1"

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
