[package]
name = "tauri-plugin-zipp-browser"
version = "1.0.0"
edition = "2021"
description = "Browser automation module for Zipp - WebView management and page control"
authors = ["Zipp Team"]
links = "tauri-plugin-zipp-browser"

[lib]
name = "tauri_plugin_zipp_browser"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["sync", "time"] }
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"
url = "2"
xcap = "0.7"
image = "0.25"

[target.'cfg(target_os = "linux")'.dependencies]
webkit2gtk = "2.0"
javascriptcore-rs = "1.1"

[target.'cfg(target_os = "windows")'.dependencies]
webview2-com = "0.38"
# Use same windows-core version that webview2-com uses
windows-core = "0.61"

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }

[features]
default = []
