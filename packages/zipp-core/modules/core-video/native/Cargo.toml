[package]
name = "zipp-video"
version = "1.0.0"
edition = "2021"
description = "Video processing module for Zipp - FFmpeg-based frame extraction"
authors = ["Zipp Team"]

[lib]
name = "zipp_video"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2", features = [] }
base64 = "0.22"
tempfile = "3"
ffmpeg-sidecar = "2.0"
dirs = "5"

[target.'cfg(windows)'.dependencies]
# Windows-specific dependencies if needed

[features]
default = []
